<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traditional Indian Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        
        /* Fixed Grid Layout: Forces a clean 2-column layout on desktops, 1 column on mobile */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Forces exactly 2 columns side-by-side */
            gap: 25px;
            max-width: 800px; /* Snugs the cards closer together for better alignment */
            margin: 30px auto;
            padding: 10px;
        }
        
        /* Styling for the clickable image card */
        .game-link {
            text-decoration: none;
            color: #333;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        
        .game-link:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
        }
        
        .game-link img {
            width: 100%;
            height: 250px; /* Slightly taller for better image visibility */
            object-fit: cover;
        }
        
        .game-name {
            font-weight: bold;
            padding: 15px;
            font-size: 1.2rem;
            background: #fff;
            border-top: 1px solid #eee;
        }

        /* Responsive design: Stack into 1 column on smaller mobile screens */
        @media (max-width: 600px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <h1>Traditional Indian Games</h1>
    <p>Click on any image to learn more about the history and rules of the game.</p>

    <div class="games-grid">
        <!-- Game 1 -->
        <a href="kabaddi.html" class="game-link">
            <img src="kabaddi.jpg" alt="Kabaddi">
            <div class="game-name">Kabaddi</div>
        </a>

        <!-- Game 2 -->
        <a href="kho_kho.html" class="game-link">
            <img src="kho_kho.jpg" alt="Kho Kho">
            <div class="game-name">Kho Kho</div>
        </a>

        <!-- Game 3 -->
        <a href="chess.html" class="game-link">
            <img src="chess.jpg" alt="Chess">
            <div class="game-name">Chess (Shatranj)</div>
        </a>

        <!-- Game 4 -->
        <a href="carrom.html" class="game-link">
            <img src="carrom.jpg" alt="Carrom">
            <div class="game-name">Carrom</div>
        </a>
    </div>

</body>
</html>
